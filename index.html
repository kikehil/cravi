<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--p:#FF4103;--pl:#FFF2EE;--pd:#CC3302;--bg:#FFFBF8;--sf:#FFF;--bd:#EDE8E3;--t:#001621;--t2:#6B5F58;--t3:#A89890;--gr:#22A861;--r:16px;--nh:68px;--orange:#ef8331}
html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--t);-webkit-font-smoothing:antialiased}
#root{max-width:430px;margin:0 auto;height:100vh;background:var(--bg);position:relative;overflow:hidden}
.wrap{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.wrap.hide{display:none}
.pb{padding-bottom:calc(var(--nh) + 20px)}
.bnav{position:absolute;bottom:0;left:0;right:0;height:var(--nh);background:#fff;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-around;padding:0 4px 10px;z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 14px;border:none;background:none;cursor:pointer;border-radius:10px;font-family:inherit}
.ni.on .nl{color:var(--p);font-weight:700}
.nl{font-size:11px;color:var(--t3)}
.card{background:#fff;border-radius:var(--r);border:1px solid var(--bd)}
.btn{background:var(--p);color:#fff;border:none;border-radius:100px;padding:15px 28px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s}
.btn:active{background:var(--pd);transform:scale(.98)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;border:1.5px solid var(--bd);font-size:13px;font-weight:500;background:#fff;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;color:var(--t)}
.chip.on{background:var(--p);border-color:var(--p);color:#fff}
.bdg{background:var(--p);color:#fff;border-radius:100px;font-size:11px;font-weight:700;padding:2px 7px;min-width:20px;text-align:center}
.ibtn{width:40px;height:40px;border-radius:12px;border:1.5px solid var(--bd);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.qc{display:flex;align-items:center;gap:10px;background:var(--pl);border-radius:100px;padding:4px}
.qb{width:28px;height:28px;border-radius:50%;background:var(--p);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;font-family:inherit}
.qb:active{background:var(--pd)}
.qn{font-size:15px;font-weight:700;min-width:20px;text-align:center}
.rc{background:#fff;border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;cursor:pointer;transition:transform .15s}
.rc:active{transform:scale(.98)}
.inp{width:100%;padding:13px 15px;border:1.5px solid var(--bd);border-radius:12px;font-family:inherit;font-size:15px;background:#fff;color:var(--t);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--p)}
.sbar{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--bd);border-radius:12px;padding:11px 15px;cursor:pointer}
.sbar:focus-within{border-color:var(--p)}
.sbar input{border:none;background:none;flex:1;font-family:inherit;font-size:14px;color:var(--t);outline:none}
.sbar input::placeholder{color:var(--t3)}
.sh{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--bd)}
.sdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.sdot.dn{background:var(--gr);color:#fff}
.sdot.cu{background:var(--p);color:#fff}
.sdot.pe{background:#F0EBE7;color:var(--t3)}
.sln{width:2px;height:26px;margin-left:12px}
.sln.dn{background:var(--gr)}
.sln.pe{background:var(--bd)}
.dv{height:1px;background:var(--bd)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease both}
@keyframes scaleIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.si{animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pu{animation:pulse 1.4s ease-in-out infinite}
</style>

function CartFAB(p){
  var cnt=p.cart.reduce(function(s,i){return s+i.qty},0);
  var tot=p.cart.reduce(function(s,i){return s+i.price*i.qty},0);
  if(!cnt)return null;
  return h('div',{style:{padding:'0 18px 12px'}},
    h('button',{className:'btn',onClick:function(){p.nav('cart')},style:{justifyContent:'space-between',padding:'14px 22px',boxShadow:'0 4px 20px rgba(255,65,3,.35)'}},
      h('span',{className:'bdg',style:{background:'rgba(255,255,255,.25)'}},cnt),
      h('span',null,'Ver carrito'),
      h('span',null,'$',tot,' MXN')
    )
  );
}

function Checkout(p){

  function getLoc(){
    if(!navigator.geolocation) return alert('Geolocalización no soportada');
    setAdLoad(true);
    navigator.geolocation.getCurrentPosition(function(pos){
      var lat=pos.coords.latitude, lon=pos.coords.longitude;
      setCrd({lat:lat, lon:lon});
      fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon)
      .then(function(r){return r.json()})
      .then(function(d){
        var a=d.address;
        var str=((a.road||'')+' '+(a.house_number||'')+', '+(a.suburb||a.neighbourhood||'')+', '+(a.city||a.town||a.village||'')).replace(/ ,/g,',').replace(/^, | , $/g,'').replace(/,,/g,',').trim();
        if(str.endsWith(',')) str=str.slice(0,-1);
        setAd(str);
        setAdLoad(false);
      }).catch(function(){setAdLoad(false);alert('Error al obtener dirección');});
    },function(){setAdLoad(false);alert('Permiso denegado o error de GPS');});
  }

  function go(){
    if(!nm.trim()||!ph.trim()||!ad.trim()){alert('Por favor completa nombre, teléfono y dirección.');return;}
    setLoad(true);
    var locStr = "\n📍 *Dirección:* " + ad;

    var orderText = "🛍️ *Nuevo pedido en Cravi*\n\n*Cliente:* " + nm + "\n📞 " + ph + locStr + "\n💳 *Pago:* " + pm + "\n\n*Artículos:*\n" + p.cart.map(function(i){return "• " + i.qty + "x " + i.name + " — $" + (i.price*i.qty)}).join("\n") + "\n\n✅ *TOTAL: $" + tot + " MXN*";
    fetch('http://localhost:3000/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: '5210000000000', message: orderText, businessId: p.cart[0] && p.cart[0].restaurantId })
    }).then(function(){
      setLoad(false); p.nav('tracking');
    }).catch(function(){
      setLoad(false); p.nav('tracking'); // Fallback para MVP
    });
  }
  return h('div',null,
    h('div',{className:'sh',style:{padding:'13px 15px',display:'flex',alignItems:'center',gap:11}},
      h('button',{className:'ibtn',onClick:p.back},h(Ico,{n:'back',sz:18})),

    ),
    h('div',{className:'pb'},
      h('div',{style:{padding:'18px',display:'flex',flexDirection:'column',gap:20}},
        h('div',null,
          h('div',{style:{fontSize:14,fontWeight:700,marginBottom:10}},'📋 Datos de contacto'),
          h('div',{style:{display:'flex',flexDirection:'column',gap:9}},
            h('input',{className:'inp',placeholder:'Nombre completo *',value:nm,onInput:function(e){setNm(e.target.value)}}),
            h('input',{className:'inp',placeholder:'Teléfono de contacto *',type:'tel',value:ph,onInput:function(e){setPh(e.target.value)}})
          )
        ),
        h('div',null,
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
            h('div',{style:{fontSize:14,fontWeight:700}},'📍 Dirección de entrega'),
            h('button',{onClick:getLoc,style:{background:'none',border:'none',color:'#FF4103',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:4}},'🎯 Usar mi ubicación')

          h('textarea',{className:'inp',placeholder:adLoad?'Obteniendo ubicación...':'Calle, número, colonia, referencias...',value:ad,onInput:function(e){setAd(e.target.value)},style:{resize:'none',height:72},disabled:adLoad})
        ),

          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:9}},
            pms.map(function(mp){

/* TRACKING */
function Tracking(p){
  var _s=useState(1),step=_s[0],setStep=_s[1];
  var _t=useState(0),tk=_t[0],setTk=_t[1];
  var rn=(p.cart[0]&&p.cart[0].restaurantName)||'Tacos El Güero';
  var oid='#MNV'+(0|1000+Math.random()*9000);
  useEffect(function(){
    var t=setInterval(function(){
      setTk(function(n){
        var nx=n+1;
        if(nx===10)setStep(2);
        if(nx===22)setStep(3);
        if(nx===38)setStep(4);
        return nx;
      });
    },500);
    return function(){clearInterval(t)};
  },[]);
  var eta=Math.max(2,28-(0|tk*.5));
  var steps=[
    {l:'Pedido recibido',d:'Tu orden fue confirmada',e:'✓'},

      ),
      h('div',{style:{padding:'20px 18px 0'}},
        h('div',{style:{fontSize:14,fontWeight:700,marginBottom:13}},'Estado del pedido'),
        h('div',{className:'card',style:{padding:'15px'}},
          steps.map(function(s,i){
            var cls='sdot '+(i<step?'dn':i===step?'cu':'pe')+(i===step&&step<4?' pu':'');
            return h('div',{key:i},
              h('div',{style:{display:'flex',alignItems:'flex-start',gap:11,padding:'7px 0'}},
                h('div',{className:cls},i<step?'✓':s.e),
                h('div',{style:{flex:1,paddingTop:1}},
                  h('div',{style:{fontSize:14,fontWeight:i<=step?700:500,color:i<=step?'#001621':'#A89890'}},s.l),
                  h('div',{style:{fontSize:12,color:i<=step?'#6B5F58':'#C4B8B0',marginTop:2}},s.d)
                )
              ),
              i<steps.length-1&&h('div',{className:'sln '+(i<step?'dn':'pe')})
            );
          })
        )
      ),
      h('div',{style:{padding:'14px 18px 0'}},
        h('div',{className:'card',style:{padding:'14px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',null,
            h('div',{style:{fontSize:14,fontWeight:700}},rn),
            h('div',{style:{fontSize:12,color:'#A89890'}},'¿Alguna duda?')
          ),
          h('button',{style:{display:'flex',alignItems:'center',gap:6,padding:'9px 14px',background:'#E8F5E9',border:'none',borderRadius:100,cursor:'pointer',color:'#22A861',fontSize:13,fontWeight:600,fontFamily:'inherit'}},
            h(Ico,{n:'phone',sz:13,c:'#22A861'}),' Llamar'
          )
        )
      ),
      step>=4&&h('div',{style:{padding:'16px 18px 0'}},
        h('button',{className:'btn',onClick:function(){p.nav('home')}},'Volver al inicio 🏠')
      )
    )
  );
}

/* BOTTOM NAV */
function BNav(p){
  if(p.sc==='onboarding')return null;
  var tabs=[{id:'home',l:'Inicio',n:'home'},{id:'search',l:'Buscar',n:'search'},{id:'orders',l:'Pedidos',n:'orders'},{id:'profile',l:'Perfil',n:'profile'}];
  return h('nav',{className:'bnav'},
    tabs.map(function(t){
      return h('button',{key:t.id,className:'ni'+(p.sc===t.id?' on':''),onClick:function(){p.go(t.id)}},
        h('div',{style:{position:'relative',display:'flex'}},
          h(Ico,{n:t.n,sz:22,c:p.sc===t.id?'#FF4103':'#A89890'}),
          t.id==='orders'&&p.cnt>0&&h('span',{className:'bdg',style:{position:'absolute',top:-6,right:-10,fontSize:10,padding:'1px 5px'}},p.cnt)
        ),
        h('span',{className:'nl'},t.l)
      );
    })
  );
}

/* APP */
function App(){
  var _rs=useState([]),rests=_rs[0],setRests=_rs[1];
  useEffect(function(){
    fetch('http://localhost:3000/api/businesses')
    .then(function(r){return r.json()})
    .then(function(d){
      setRests(d.map(function(b){
        return {
          id: b.id, name: b.bizName, cat: b.bizCat, emoji: '🏪',
          grad: 'linear-gradient(135deg,'+(b.bizColor||'#FF4103')+'cc,'+(b.bizColor||'#FF4103')+')',
          logo: b.logoPreview, banner: b.bannerPreview,
          rating: 5.0, reviews: 1, time: b.bizTime||'20-30', min: parseInt(b.bizMin)||0, tag: 'Nuevo',
          desc: b.bizDesc || '', menu: []
        };
      }));
    });
  },[]);
  var _sc=useState('onboarding'),sc=_sc[0],setSc=_sc[1];
  var _hi=useState([]),hist=_hi[0],setHist=_hi[1];
  var _ca=useState([]),cart=_ca[0],setCart=_ca[1];
  var _re=useState(null),rest=_re[0],setRest=_re[1];
  var _od=useState(null),od=_od[0],setOd=_od[1];
  var cnt=cart.reduce(function(s,i){return s+i.qty},0);

  function nav(to,p){
    setHist(function(h){return h.concat([sc])});
    if(to==='restaurant'&&p)setRest(p);
    if(to==='checkout'&&p)setOd(p);
    if(to==='tracking')setCart([]);
    setSc(to);
  }
  function back(){
    var p=hist[hist.length-1]||'home';
    setHist(function(h){return h.slice(0,-1)});
    setSc(p);
  }
  function go(to){setHist([]);setSc(to);}
  function add(item){
    setCart(function(c){
      var e=c.find(function(i){return i.id===item.id});
      if(e)return c.map(function(i){return i.id===item.id?Object.assign({},i,{qty:i.qty+1}):i});
      return c.concat([Object.assign({},item,{qty:1})]);
    });
  }
  function rem(id){
    setCart(function(c){
      var e=c.find(function(i){return i.id===id});
      if(!e)return c;
      if(e.qty<=1)return c.filter(function(i){return i.id!==id});
      return c.map(function(i){return i.id===id?Object.assign({},i,{qty:i.qty-1}):i});
    });
  }
  function upd(id,qty){
    if(qty<=0)setCart(function(c){return c.filter(function(i){return i.id!==id})});
    else setCart(function(c){return c.map(function(i){return i.id===id?Object.assign({},i,{qty:qty}):i})});
  }

  var screens={
    onboarding:h(Onboarding,{done:function(){go('home')}}),
    home:h(Home,{nav:nav,cart:cart,rests:rests}),
    search:h(Search,{nav:nav,back:back,cart:cart,rests:rests}),
    restaurant:rest?h(Restaurant,{r:rest,nav:nav,back:back,cart:cart,add:add,rem:rem}):null,
    cart:h(Cart,{cart:cart,upd:upd,nav:nav,back:back}),
    checkout:h(Checkout,{cart:cart,od:od,nav:nav,back:back}),
    tracking:h(Tracking,{nav:nav,cart:cart}),
    orders:h(Orders,{nav:nav}),
    profile:h(Profile,{nav:nav}),
  };

  return h('div',{style:{position:'relative',height:'100vh',overflow:'hidden'}},
    Object.keys(screens).map(function(k){
      var comp=screens[k];
      if(!comp)return null;
      return h('div',{key:k,className:'wrap'+(sc===k?'':' hide')},comp);
    }),
    h(BNav,{sc:sc,go:go,cnt:cnt})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
})();
</script>
