<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;font-family:'Plus Jakarta Sans',system-ui,sans-serif;padding:48px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.tag{color:#555;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:8px}

.fb-frame{width:820px;border-radius:12px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.cover{width:820px;height:312px;position:relative;overflow:hidden;background:#001621}

/* Elementos decorativos */
.dot-grid{position:absolute;inset:0;opacity:.07}
.orange-bar{position:absolute;left:0;top:0;width:6px;height:100%;background:#FF4103}
.glow{position:absolute;width:400px;height:400px;border-radius:50%;background:#FF4103;opacity:.07;top:-120px;right:-80px}
.glow2{position:absolute;width:200px;height:200px;border-radius:50%;background:#FF4103;opacity:.05;bottom:-80px;left:200px}

/* Contenido */
.cover-inner{position:absolute;inset:0;display:flex;align-items:center;padding:0 56px;gap:44px}
.logo-block{display:flex;flex-direction:column;gap:16px;flex-shrink:0}
.cover-logo{height:64px;width:auto;display:block}
.logo-url{font-size:13px;color:rgba(255,255,255,.35);font-weight:500;letter-spacing:.04em}
.vline{width:1.5px;height:100px;background:rgba(255,255,255,.12);flex-shrink:0}
.text-block{}
.cover-headline{font-size:42px;font-weight:900;color:#fff;line-height:1.0;letter-spacing:-1.5px}
.cover-headline em{color:#FF4103;font-style:normal}
.cover-sub{font-size:15px;color:rgba(255,255,255,.45);margin-top:10px;font-weight:500}

/* FB bottom row */
.fb-row{background:#fff;padding:0 16px 14px;display:flex;align-items:flex-end;gap:14px}
.fb-avatar{width:168px;height:168px;border-radius:50%;border:4px solid #fff;margin-top:-76px;flex-shrink:0;overflow:hidden;background:#FF4103;display:flex;align-items:center;justify-content:center}
.fb-avatar img{width:68%;height:68%;object-fit:contain}
.fb-meta{padding-bottom:10px;flex:1}
.fb-name{font-size:22px;font-weight:800;color:#050505}
.fb-sub{font-size:14px;color:#65676B;margin-top:2px}
.fb-actions{display:flex;gap:8px;padding-bottom:10px;margin-left:auto}
.fb-btn{padding:8px 18px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.fb-btn-p{background:#1877F2;color:#fff}
.fb-btn-s{background:#E4E6EB;color:#050505}
</style>
</head>
